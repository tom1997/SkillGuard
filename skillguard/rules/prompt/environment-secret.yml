id: SG-PROMPT-005
title: Secret-like environment variable referenced
severity: medium
category: permission-inference
languages:
  - prompt
match:
  regex: '(?-i:\$\{[A-Z][A-Z0-9_]*(API_KEY|TOKEN|SECRET|PASSWORD)[A-Z0-9_]*\}|[A-Z][A-Z0-9_]*(API_KEY|TOKEN|SECRET|PASSWORD)[A-Z0-9_]*)'
message: Skill instructions reference a secret-like environment variable.
remediation: Document why the variable is needed and avoid exposing its value in prompts, logs, or reports.
capabilities:
  - kind: environment
    access: read
    resource: "$ENV"
