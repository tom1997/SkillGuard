id: SG-JS-004
title: Sensitive home directory referenced
severity: critical
category: data-exfiltration
languages:
  - javascript
match:
  regex: '(\.ssh|id_rsa|\.aws|credentials|\.kube|gcloud)'
message: JavaScript code references sensitive local credential material.
remediation: Avoid reading SSH keys, cloud credentials, or kubeconfig from Skill code.
capabilities:
  - kind: filesystem
    access: sensitive-read
    resource: "~/.ssh/**"
  - kind: filesystem
    access: sensitive-read
    resource: "~/.aws/**"
