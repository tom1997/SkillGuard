id: SG-PROMPT-003
title: Sensitive local secret requested in prompt
severity: critical
category: data-exfiltration
languages:
  - prompt
match:
  regex: '(~\/\.ssh|id_rsa|\.aws\/credentials|~\/\.aws|~\/\.kube|private key)'
message: Skill instructions reference sensitive local secret files.
remediation: Do not ask agents to read local secret files unless the user explicitly requests it for a narrow task.
capabilities:
  - kind: filesystem
    access: sensitive-read
    resource: "~/.ssh/**"
