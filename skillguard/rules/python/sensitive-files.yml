id: SG-PY-001
title: Sensitive SSH or cloud material referenced
severity: critical
category: data-exfiltration
languages:
  - python
match:
  regex: '(\.ssh|id_rsa|\.aws|credentials|\.kube|gcloud)'
message: Python code references sensitive local credential material.
remediation: Avoid reading SSH keys, cloud credentials, or kubeconfig from Skill code.
capabilities:
  - kind: filesystem
    access: sensitive-read
    resource: "~/.ssh/**"
  - kind: filesystem
    access: sensitive-read
    resource: "~/.aws/**"
